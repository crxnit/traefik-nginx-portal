# Default server — catches any request whose Host header
# doesn't match an explicit server_name elsewhere.
server {
    listen 80 default_server;
    server_name _;

    # Option A: return a 444 (close connection, no response)
    # Best for blocking probes and misconfigured DNS.
    # return 444;

    # Option B: return a 404 with a simple message
    # return 404 "Not Found\n";

    # Option C: serve a branded landing page (recommended below)
    root /var/www/default;
    index index.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
