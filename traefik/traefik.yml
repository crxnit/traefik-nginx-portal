api:
  dashboard: false

ping:
  entryPoint: ping

entryPoints:
  ping:
    address: ":8082"
  web:
    address: ":80"
    http:
      redirections:
        entryPoint:
          to: websecure
          scheme: https
  websecure:
    address: ":443"
    http:
      tls:
        options: default
    transport:
      respondingTimeouts:
        readTimeout: 30s
        writeTimeout: 30s
        idleTimeout: 120s

tls:
  options:
    default:
      minVersion: VersionTLS12
      cipherSuites:
        - TLS_ECDHE_RSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_RSA_WITH_AES_256_GCM_SHA384
        - TLS_ECDHE_ECDSA_WITH_AES_128_GCM_SHA256
        - TLS_ECDHE_ECDSA_WITH_AES_256_GCM_SHA384
        - TLS_AES_128_GCM_SHA256
        - TLS_AES_256_GCM_SHA384
        - TLS_CHACHA20_POLY1305_SHA256

providers:
  file:
    directory: /etc/traefik/dynamic/
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      # REQUIRED: replace with a real contact email. Let's Encrypt sends
      # expiration warnings and occasional policy notices here — must be
      # monitored. Do NOT ship the placeholder into production.
      email: letsencrypt@example.com
      storage: /acme.json
      httpChallenge:
        entryPoint: web
  # DNS-01 resolver for sites that need wildcard certs (e.g. apps that mint
  # per-tenant subdomains). Opt-in per site via tls.certResolver:
  # letsencrypt-dns + tls.domains in the dynamic YAML; HTTP-01 stays the
  # default for everything else. Requires AWS_ACCESS_KEY_ID +
  # AWS_SECRET_ACCESS_KEY (+ AWS_REGION, optional AWS_HOSTED_ZONE_ID) in
  # .env, scoped to route53:ChangeResourceRecordSets on the relevant zone.
  letsencrypt-dns:
    acme:
      email: letsencrypt@example.com
      storage: /acme.json
      dnsChallenge:
        provider: route53
        # Public resolvers used for the post-publish propagation check —
        # avoids races where lego asks the local resolver before Route53's
        # change has propagated outward.
        resolvers:
          - "1.1.1.1:53"
          - "8.8.8.8:53"

log:
  level: INFO

accessLog: {}
