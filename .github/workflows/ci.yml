name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  # Parse every script on both bash 5 (ubuntu-latest) and bash 3.2
  # (macos-latest — Apple still ships the GPLv2 era of bash). This
  # catches the `${var,,}` class of regressions that only surface at
  # runtime under 3.2.
  bash-syntax:
    name: bash -n (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - name: Show bash version
        run: bash --version | head -1
      - name: Syntax-check every shell script
        run: |
          fail=0
          for f in bin/*.sh install.sh; do
            echo "→ $f"
            bash -n "$f" || fail=1
          done
          exit $fail

  # Lint every script. Severity set to `warning` so real bugs block
  # merges but style-level noise stays silent. Bump to `info` for a
  # strict pass (will require some inline `# shellcheck disable=`
  # directives).
  shellcheck:
    name: shellcheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: ludeeus/action-shellcheck@master
        with:
          severity: warning
          scandir: ./bin
          additional_files: install.sh

  # Secrets scan — catches private keys, API tokens, AWS credentials,
  # etc. that sneak in through a rushed commit. Runs on the full git
  # history, so fetch-depth: 0 is mandatory.
  #
  # NOTE: we install gitleaks directly rather than using the
  # gitleaks-action, because the action's incremental-scan logic
  # breaks on initial pushes (it tries to scan `<root-commit>^..HEAD`
  # and fails because root commits have no parent). Direct
  # invocation via `gitleaks git` handles all cases uniformly.
  gitleaks:
    name: gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Install gitleaks
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version
      - name: Scan full git history
        run: gitleaks git --redact -v .
